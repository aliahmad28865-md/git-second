name: cache job concurrency artifact

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency: 
      group: deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: make build
        run: npm run build

      - name: Upload artifacts
        uses: uses: actions/upload-artifact@v7.0.1
        with:
          name: make-artifacts
          path: .next
          include-hidden-files: true
